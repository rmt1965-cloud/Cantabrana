<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantabrana: Omni-Kernel 8K</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400;1,700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Spectral', serif; height: 100vh; }

        /* 1. TEXTURAS DE MATERIA VIVA (OMNI-KERNEL) */
        #contenedor-materia {
            position: fixed; inset: 0; z-index: 5;
            filter: url(#filtro-organico); /* Aplica distorsión fractal */
        }
        .materia-viva {
            position: absolute; inset: -50%;
            width: 200%; height: 200%;
            background-size: 400% 400%;
            transition: background 6s ease-in-out, opacity 4s;
            animation: deriva-organica 30s infinite linear;
        }
        @keyframes deriva-organica {
            0% { background-position: 0% 50%; transform: rotate(0deg); }
            50% { background-position: 100% 50%; transform: rotate(2deg); }
            100% { background-position: 0% 50%; transform: rotate(0deg); }
        }

        /* Familias de Textura Reales */
        .magma { background: radial-gradient(circle, #ff4500 0%, #800000 40%, #1a0505 100%); }
        .alquitran { background: radial-gradient(circle, #1a1a1a 0%, #050505 60%, #000 100%); }
        .miel { background: radial-gradient(circle, #d4af37 0%, #5c4b14 50%, #1a1a1a 100%); }

        /* 2. TEXTO HIERRO CANDENTE */
        .hierro-candente {
            color: #ff9d00;
            text-shadow: 0 0 10px #ff4500, 0 0 20px #ff0000;
            animation: incandescencia 2s infinite alternate;
            font-weight: bold;
            filter: brightness(1.5) contrast(1.2);
        }
        @keyframes incandescencia {
            from { text-shadow: 0 0 10px #ff4500, 0 0 20px #ff0000; opacity: 0.8; }
            to { text-shadow: 0 0 25px #ff8000, 0 0 40px #ff4500, 0 0 60px #ff0000; opacity: 1; }
        }

        /* 3. PERGAMINO FULL SCREEN */
        #escenario-pergamino {
            position: fixed; inset: 0; z-index: 6000;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); /* Elimina el ruido visual exterior */
            opacity: 0; transition: 4s;
        }
        #pergamino-img {
            width: 100vw; height: 100vh;
            object-fit: contain; /* Ocupa el máximo posible sin deformar */
            filter: drop-shadow(0 0 50px #000);
        }

        /* 4. TRANSICIONES DE FOTO "CROSS-FADE" */
        #visor { position: fixed; inset: 0; z-index: 100; display: none; }
        .canvas-foto {
            position: absolute; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover; /* Llenado total tipo cine */
            opacity: 0; transition: opacity 3s ease-in-out;
        }

        /* BOTÓN AURA */
        #capa-inicio { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; }
        .btn-aura {
            background: none; border: 1px solid #d4af37; color: #d4af37; padding: 30px 60px;
            font-size: 1.5rem; cursor: pointer; letter-spacing: 10px; text-transform: uppercase;
            animation: pulse-aura 2s infinite;
        }
        @keyframes pulse-aura { 0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.7); } 70% { box-shadow: 0 0 0 30px rgba(212, 175, 55, 0); } 100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); } }
    </style>
</head>
<body>

    <svg style="display:none">
        <filter id="filtro-organico">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" seed="2">
                <animate attributeName="baseFrequency" dur="60s" values="0.015;0.025;0.015" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" scale="50" />
        </filter>
    </svg>

    <div id="contenedor-materia">
        <div id="materia" class="materia-viva alquitran"></div>
    </div>

    <div id="capa-inicio">
        <button class="btn-aura" id="btn-ritual">Escuchar el tiempo</button>
    </div>

    <div id="escenario-textos" style="position:fixed; inset:0; z-index:7000; display:flex; align-items:center; justify-content:center; pointer-events:none;">
        <div id="fase-txt" style="font-size: 3rem; text-align: center; opacity: 0; transition: 4s;"></div>
    </div>

    <div id="escenario-pergamino">
        <img id="pergamino-img" src="">
        <div id="texto-candente" class="hierro-candente" style="position:absolute; width:60%; text-align:center; font-size:1.5rem; opacity:0; transition:4s;">
            ESTAS CANCIONES SON DE OTRO TIEMPO, ALGUNAS DE ELLAS PUEDEN HERIR SU SENSIBILIDAD
        </div>
    </div>

    <div id="visor"></div>

    <audio id="audio-amb"></audio>
    <audio id="audio-jota"></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const jotaId = params.get('jota');
        const wait = ms => new Promise(res => setTimeout(res, ms));

        async function ejecutarRitual() {
            const res = await fetch('galeria.json');
            const data = await res.json();
            const mat = document.getElementById('materia');

            document.getElementById('btn-ritual').onclick = async () => {
                document.getElementById('capa-inicio').style.opacity = '0';
                const amb = document.getElementById('audio-amb');
                const jota = document.getElementById('audio-jota');
                amb.play().then(()=>amb.pause());

                // FASE 1: CANTABRANA (Textura Alquitrán)
                mat.className = "materia-viva alquitran";
                if(data.ambientes.length) { amb.src = "ambiente/" + data.ambientes[0]; amb.play(); }
                await mostrarTexto("CANTABRANA LLAMA AL PASADO...", 5000);

                // FASE 2: PUERTAS (Textura Miel)
                mat.className = "materia-viva miel";
                await mostrarTexto("A TRAVÉS DE SUS PUERTAS CENTENARIAS...", 5000);

                // FASE 3: PERGAMINO (Textura Magma)
                mat.className = "materia-viva magma";
                const escPerg = document.getElementById('escenario-pergamino');
                document.getElementById('pergamino-img').src = `assets/pergaminos/${data.pergaminos[0]}`;
                escPerg.style.opacity = '1';
                await wait(2000);
                document.getElementById('texto-candente').style.opacity = '1';
                await wait(8000);
                escPerg.style.opacity = '0';
                await wait(3000);

                // FASE 4: JOTA Y FOTOS
                amb.pause();
                if(jotaId) {
                    jota.src = "jotas/" + jotaId;
                    jota.play();
                    document.getElementById('visor').style.display = 'block';
                    const fotos = [...data.fotos_arcos.map(f=>"fotos/arcos_puertas/"+f), ...data.fotos_detalles.map(f=>"fotos/detalles/"+f)];
                    iniciarCarrusel(fotos, jota);
                }
            };
        }

        async function mostrarTexto(msg, tiempo) {
            const el = document.getElementById('fase-txt');
            el.innerText = msg;
            el.style.opacity = '1';
            el.style.filter = 'blur(0px)';
            await wait(tiempo);
            el.style.opacity = '0';
            el.style.filter = 'blur(20px)';
            await wait(2000);
        }

        function iniciarCarrusel(lista, player) {
            let i = 0;
            const visor = document.getElementById('visor');
            
            const cambiar = () => {
                if(player.ended) { location.reload(); return; }
                
                const img = document.createElement('img');
                img.src = lista[i % lista.length];
                img.className = 'canvas-foto';
                visor.appendChild(img);
                
                setTimeout(() => {
                    img.style.opacity = '1';
                    if(visor.children.length > 1) {
                        visor.children[0].style.opacity = '0';
                        setTimeout(() => visor.removeChild(visor.children[0]), 3000);
                    }
                    i++;
                }, 100);
            };
            
            cambiar();
            setInterval(cambiar, 6000); // 4s imagen + 2s de fundido cruzado real
        }

        window.onload = ejecutarRitual;
    </script>
</body>
</html>
