<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Capas de la Experiencia -->
    <div id="texture-overlay"></div>
    <div id="sello-central" class="hidden"></div>
    <div id="estela-piedra" class="hidden"></div>
    <div id="piedras-contenedor" class="hidden">
        <div class="piedra p1"></div>
        <div class="piedra p2"></div>
    </div>
    <div id="pulso-luz"></div>

    <div id="app">
        <button id="btn-start">INICIAR EXPERIENCIA</button>
    </div>

    <audio id="player-jota"></audio>
    <audio id="player-ambient"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const jotaFile = params.get('jota');
            const res = await fetch('galeria.json?v=' + Date.now());
            const galeria = await res.json();

            const btn = document.getElementById('btn-start');
            const elements = {
                texture: document.getElementById('texture-overlay'),
                sello: document.getElementById('sello-central'),
                estela: document.getElementById('estela-piedra'),
                piedras: document.getElementById('piedras-contenedor'),
                pulso: document.getElementById('pulso-luz'),
                pAmb: document.getElementById('player-ambient'),
                pJota: document.getElementById('player-jota')
            };

            btn.addEventListener('click', async () => {
                btn.style.display = 'none';

                // --- FASE 1: TEXTURA Y AMBIENTE ---
                if(galeria.texturas?.length > 0) {
                    elements.texture.style.backgroundImage = `url('${galeria.texturas[0]}')`;
                    elements.texture.classList.add('active');
                }
                elements.pAmb.src = galeria.musica_ambiente[0];
                elements.pAmb.play();

                // --- FASE 2: EL SELLO (A los 3 seg) ---
                setTimeout(() => {
                    elements.sello.classList.remove('hidden');
                    elements.sello.classList.add('fade-in');
                }, 3000);

                // --- FASE 3: LA JOTA Y LA ESTELA (A los 7 seg) ---
                setTimeout(() => {
                    elements.pAmb.pause(); // Cesa el ambiente
                    if(jotaFile) {
                        elements.pJota.src = `jotas/${jotaFile}`;
                        elements.pJota.play();
                    }
                    elements.sello.classList.add('hidden');
                    elements.estela.classList.remove('hidden'); // Aparece la estela de piedra
                }, 7000);

                // --- FASE 4: EMERGEN LAS DOS PIEDRAS (A los 12 seg) ---
                setTimeout(() => {
                    elements.piedras.classList.remove('hidden');
                }, 12000);

                // --- FASE 5: EXPLOSIÓN, LUZ Y REINICIO (Al terminar la Jota) ---
                elements.pJota.onended = () => {
                    elements.estela.classList.add('explosion'); // Animación de estallido
                    elements.pulso.classList.add('activar-pulso'); // Flash blanco total
                    
                    setTimeout(() => {
                        window.location.reload(); // Reinicia la experiencia (como nuevo escaneo)
                    }, 2000);
                };
            });
        });
    </script>
</body>
</html>
