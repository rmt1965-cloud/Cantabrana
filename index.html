<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantabrana: Omni-Kernel 8K</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400;1,700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Spectral', serif; height: 100vh; }

        /* 1. MATERIA VIVA: TEXTURAS CON VOLUMEN */
        #capa-materia {
            position: fixed; inset: 0; z-index: 1;
            filter: contrast(180%) brightness(0.6) url(#filtro-materia);
        }
        .materia {
            position: absolute; inset: -20%; width: 140%; height: 140%;
            transition: 5s ease-in-out;
            background-size: 200% 200%;
            animation: oleada 20s infinite alternate;
        }
        @keyframes oleada {
            0% { transform: scale(1) translate(0,0); }
            100% { transform: scale(1.1) translate(-2%, -2%); }
        }

        /* Familias de Materia (Viscosidad) */
        .vino { background: radial-gradient(circle, #4a0404, #1a0101, #000); }
        .oro { background: radial-gradient(circle, #b8860b, #5c4b14, #000); }
        .magma { background: radial-gradient(circle, #ff4500, #8b0000, #000); }
        .alquitran { background: radial-gradient(circle, #1a1a1a, #050505, #000); }

        /* 2. TEXTO HIERRO CANDENTE (GRANDE Y BRUTAL) */
        .texto-fuego {
            position: absolute; z-index: 8000; inset: 0;
            display: flex; align-items: center; justify-content: center;
            padding: 40px; text-align: center;
            font-size: clamp(2rem, 10vw, 4.5rem);
            font-weight: 700; color: #ffca28;
            text-shadow: 0 0 20px #ff4500, 0 0 50px #ff0000;
            opacity: 0; filter: blur(20px); transition: 4s;
        }

        /* 3. EL PERGAMINO (PROTAGONISTA) */
        #escenario-pergamino {
            position: fixed; inset: 0; z-index: 6000;
            background: #000; display: none;
            align-items: center; justify-content: center;
        }
        #pergamino-img {
            width: 100%; height: 100%;
            object-fit: contain; /* Elimina deformación y bordes raros */
            filter: drop-shadow(0 0 40px rgba(0,0,0,0.9));
        }
        .advertencia-candente {
            position: absolute; width: 70%;
            color: #3b0a0a; font-size: clamp(1.2rem, 5vw, 2rem);
            font-weight: 800; text-align: center; line-height: 1.2;
            text-transform: uppercase; opacity: 0; transition: 3s;
        }

        /* 4. VISOR CINEMATOGRÁFICO */
        #visor { position: fixed; inset: 0; z-index: 100; display: none; }
        .foto-film {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: cover; opacity: 0;
            transition: opacity 3s ease-in-out, transform 12s linear;
        }

        /* BOTÓN INICIAL */
        #capa-inicio { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; }
        .btn-ritual {
            background: none; border: 2px solid #d4af37; color: #d4af37; padding: 40px 80px;
            font-size: 1.8rem; cursor: pointer; letter-spacing: 12px; text-transform: uppercase;
            transition: 1s;
        }
    </style>
</head>
<body>

    <svg style="display:none">
        <filter id="filtro-materia">
            <feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="4" />
            <feDisplacementMap in="SourceGraphic" scale="80" />
        </filter>
    </svg>

    <div id="capa-materia"><div id="materia-viva" class="materia vino"></div></div>

    <div id="capa-inicio"><button class="btn-ritual" id="btn-ritual">ENTRAR</button></div>

    <div id="escenario-textos">
        <div id="txt-fase" class="texto-fuego"></div>
    </div>

    <div id="escenario-pergamino">
        <img id="pergamino-img" src="">
        <div id="advertencia" class="advertencia-candente">ESTAS CANCIONES SON DE OTRO TIEMPO, PUEDEN HERIR SU SENSIBILIDAD</div>
    </div>

    <div id="visor"></div>

    <audio id="snd-amb"></audio>
    <audio id="snd-jota"></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const jotaId = params.get('jota');
        const wait = ms => new Promise(res => setTimeout(res, ms));

        async function ritual8K() {
            const res = await fetch('galeria.json');
            const data = await res.json();
            const mat = document.getElementById('materia-viva');

            document.getElementById('btn-ritual').onclick = async () => {
                document.getElementById('capa-inicio').style.opacity = '0';
                const amb = document.getElementById('snd-amb');
                const jota = document.getElementById('snd-jota');
                
                // Desbloqueo forzado
                amb.play().then(()=>amb.pause());
                setTimeout(() => document.getElementById('capa-inicio').style.display = 'none', 1000);

                // FASE 1: ALQUITRÁN
                mat.className = "materia alquitran";
                if(data.ambientes.length) { amb.src = "ambiente/" + data.ambientes[0]; amb.play(); }
                await mostrarFase("CANTABRANA", 4000);

                // FASE 2: VINO
                mat.className = "materia vino";
                await mostrarFase("MEMORIA VIVA", 4000);

                // FASE 3: PERGAMINO (SOLO PERGAMINO, SIN FONDO)
                mat.style.opacity = '0'; // Apagamos texturas para que el pergamino brille solo
                const escPerg = document.getElementById('escenario-pergamino');
                document.getElementById('pergamino-img').src = `assets/pergaminos/${data.pergaminos[0]}`;
                escPerg.style.display = 'flex';
                await wait(100);
                escPerg.style.opacity = '1';
                await wait(2000);
                document.getElementById('advertencia').style.opacity = '1';
                await wait(8000);
                escPerg.style.opacity = '0';
                await wait(2000);
                escPerg.style.display = 'none';

                // FASE 4: JOTA Y FOTOS (TRANSICIÓN CINEMÁTICA)
                amb.pause();
                mat.style.opacity = '1';
                mat.className = "materia magma";
                
                if(jotaId) {
                    jota.src = "jotas/" + jotaId;
                    jota.play();
                    document.getElementById('visor').style.display = 'block';
                    const fotos = [...data.fotos_arcos.map(f=>"fotos/arcos_puertas/"+f), ...data.fotos_detalles.map(f=>"fotos/detalles/"+f)];
                    iniciarCine(fotos, jota);
                }
            };
        }

        async function mostrarFase(txt, tiempo) {
            const el = document.getElementById('txt-fase');
            el.innerText = txt;
            el.style.opacity = '1';
            el.style.filter = 'blur(0px)';
            await wait(tiempo);
            el.style.opacity = '0';
            el.style.filter = 'blur(30px)';
            await wait(2000);
        }

        function iniciarCine(lista, player) {
            let i = 0;
            const visor = document.getElementById('visor');
            
            const transicion = () => {
                if(player.ended) { location.reload(); return; }
                
                const img = document.createElement('img');
                img.src = lista[i % lista.length];
                img.className = 'foto-film';
                visor.appendChild(img);
                
                setTimeout(() => {
                    img.style.opacity = '1';
                    img.style.transform = 'scale(1.1)'; // Efecto Ken Burns
                    if(visor.children.length > 1) {
                        visor.children[0].style.opacity = '0';
                        setTimeout(() => visor.removeChild(visor.children[0]), 3000);
                    }
                    i++;
                }, 100);
            };
            
            transicion();
            setInterval(transicion, 7000);
        }

        window.onload = ritual8K;
    </script>
</body>
</html>
