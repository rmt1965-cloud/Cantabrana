<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantabrana Omni-Kernel 8K</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400;1,700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Spectral', serif; height: 100vh; color: #fff; }

        /* 1. MOTOR DE TEXTURAS DE MATERIA VIVA (OMNI-KERNEL) */
        #contenedor-materia { 
            position: fixed; inset: 0; z-index: 5; 
            filter: url(#filtro-materia) brightness(0.7) contrast(1.2); /* Aplica rugosidad y volumen */
        }
        .materia-viva {
            position: absolute; inset: -50%; width: 200%; height: 200%;
            background-size: 400% 400%; animation: deriva-materia 30s infinite linear;
            transition: background 5s ease-in-out;
        }
        @keyframes deriva-materia {
            0% { background-position: 0% 50%; transform: rotate(0deg); }
            50% { background-position: 100% 50%; transform: rotate(2deg); }
            100% { background-position: 0% 50%; transform: rotate(0deg); }
        }
        /* Familias de Texturas Reales */
        .magma { background: radial-gradient(circle, #ff4500 0%, #800000 40%, #1a0505 100%); }
        .alquitran { background: radial-gradient(circle, #1a1a1a 0%, #050505 60%, #000 100%); }
        .miel { background: radial-gradient(circle, #d4af37 0%, #5c4b14 50%, #1a1a1a 100%); }

        /* 2. TEXTOS INICIALES (Súper Contraste y Brillo) */
        #escenario-textos {
            position: fixed; inset: 0; z-index: 7000;
            display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 30px; pointer-events: none;
        }
        .texto-brutal {
            font-size: clamp(2rem, 10vw, 4rem); font-weight: 700; color: #f0e6d2;
            text-shadow: 0 0 30px rgba(255,255,255,0.7), 0 0 60px rgba(212, 175, 55, 0.5);
            opacity: 0; filter: blur(20px); transition: 4s ease-out;
        }
        .visible { opacity: 1 !important; filter: blur(0px) !important; }

        /* 3. EL PERGAMINO: ELIMINACIÓN DE TRANSPARENCIAS SUCIAS */
        #escenario-pergamino {
            position: fixed; inset: 0; z-index: 6000;
            display: flex; align-items: center; justify-content: center;
            background: #000; /* Fondo negro profundo para matar transparencias mal gestionadas */
            opacity: 0; transition: 3s;
        }
        #pergamino-img {
            width: 100vw; height: 100vh;
            object-fit: contain; /* Ocupa el máximo posible adaptado al móvil */
            filter: drop-shadow(0 0 50px rgba(0,0,0,0.9));
        }
        .texto-candente {
            position: absolute; width: 65%; text-align: center; font-size: clamp(1.2rem, 5vw, 2rem);
            color: #3b0a0a; font-weight: 800; text-transform: uppercase; line-height: 1.2;
            opacity: 0; transition: 4s;
        }

        /* 4. VISOR DE JOTA Y FOTOS CINEMÁTICAS */
        #visor-cine { position: fixed; inset: 0; z-index: 100; display: none; background: #000; }
        .foto-film {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: contain; opacity: 0; 
            transition: opacity 3s ease-in-out, transform 12s linear; /* Ken Burns orgánico */
            transform: scale(1.1); /* */
        }
        .zoom-in { transform: scale(1) !important; }

        /* BOTÓN DE ARRANQUE CON AURA */
        #capa-inicio { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; }
        .btn-aura {
            background: none; border: 2px solid #d4af37; color: #d4af37; padding: 30px 60px;
            font-size: 1.5rem; cursor: pointer; letter-spacing: 8px; text-transform: uppercase;
            animation: pulse-aura 2s infinite ease-in-out;
        }
        @keyframes pulse-aura { 0%, 100% { box-shadow: 0 0 20px #d4af37; opacity: 0.8; } 50% { box-shadow: 0 0 60px #d4af37; opacity: 1; } }
    </style>
</head>
<body>

    <svg style="display:none">
        <filter id="filtro-materia">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="4" />
            <feDisplacementMap in="SourceGraphic" scale="80" />
        </filter>
    </svg>

    <div id="contenedor-materia">
        <div id="materia" class="materia-viva alquitran"></div>
    </div>

    <div id="capa-inicio">
        <button class="btn-aura" id="btn-ritual">ESCUCHAR EL TIEMPO</button>
    </div>

    <div id="escenario-textos">
        <div id="txt-fase" class="texto-brutal"></div>
    </div>

    <div id="escenario-pergamino">
        <img id="pergamino-img" src="">
        <div id="texto-candente" class="texto-candente">ESTAS CANCIONES SON DE OTRO TIEMPO, ALGUNAS DE ELLAS PUEDEN HERIR SU SENSIBILIDAD</div>
    </div>

    <div id="visor-cine"></div>

    <audio id="audio-amb"></audio>
    <audio id="audio-jota"></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const jotaId = params.get('jota');
        const wait = ms => new Promise(res => setTimeout(res, ms));

        async function ritual8K() {
            const res = await fetch('galeria.json');
            const data = await res.json();
            const mat = document.getElementById('materia');

            document.getElementById('btn-ritual').onclick = async () => {
                document.getElementById('capa-inicio').style.opacity = '0';
                const amb = document.getElementById('audio-amb');
                const jota = document.getElementById('audio-jota');
                amb.play().then(()=>amb.pause()); // Forzar desbloqueo

                // FASE 1: CANTABRANA LLAMA AL PASADO (Textura Alquitrán)
                mat.className = "materia-viva alquitran";
                if(data.ambientes.length) { amb.src = "ambiente/" + data.ambientes[0]; amb.play(); }
                await mostrarTexto("CANTABRANA LLAMA AL PASADO...", 5000);

                // FASE 2: A TRAVÉS DE SUS PUERTAS... (Textura Miel)
                mat.className = "materia-viva miel";
                await mostrarTexto("A TRAVÉS DE SUS PUERTAS CENTENARIAS...", 5000);

                // FASE 3: EL PERGAMINO (Textura Magma)
                mat.className = "materia-viva magma";
                const escPerg = document.getElementById('escenario-pergamino');
                // Sincronizar el pergamino con el galeria.json
                if(data.pergaminos.length) document.getElementById('pergamino-img').src = `assets/pergaminos/${data.pergaminos[0]}`;
                
                escPerg.style.opacity = '1';
                await wait(2000);
                document.getElementById('texto-candente').style.opacity = '1';
                await wait(8000);
                escPerg.style.opacity = '0';
                await wait(3000);

                // FASE 4: JOTA Y FOTOS (MOTOR CINEMÁTICO)
                amb.pause();
                if(jotaId) {
                    jota.src = "jotas/" + jotaId;
                    document.getElementById('visor-cine').style.display = 'block';
                    jota.play();
                    
                    const fotos = [...data.fotos_arcos.map(f=>"fotos/arcos_puertas/"+f), ...data.fotos_detalles.map(f=>"fotos/detalles/"+f)];
                    
                    // Sincronizar carrusel con la duración de la jota
                    iniciarCine(fotos, jota);
                }
            };
        }

        async function mostrarTexto(msg, tiempo) {
            const el = document.getElementById('txt-fase');
            el.innerText = msg;
            el.classList.add('visible');
            await wait(tiempo);
            el.classList.remove('visible');
            await wait(2000);
        }

        function iniciarCine(lista, player) {
            let index = 0;
            const visor = document.getElementById('visor-cine');
            
            // Intervalo para cambiar de foto
            const carruselInterval = setInterval(() => {
                // DETECCIÓN DE FIN DE JOTA
                if (player.ended) {
                    clearInterval(carruselInterval); // Para el bucle
                    finalizarRitual(); // Reinicia el sistema
                    return;
                }
                
                cambiarFoto(lista[index % lista.length]);
                index++;
            }, 6000); // 6 seg por foto (4 visible, 2 fundido)
        }

        function cambiarFoto(ruta) {
            const visor = document.getElementById('visor-cine');
            const imgNueva = document.createElement('img');
            imgNueva.src = ruta;
            imgNueva.className = 'foto-film';
            visor.appendChild(imgNueva);
            
            setTimeout(() => {
                imgNueva.style.opacity = '1';
                imgNueva.classList.add('zoom-in'); // Efecto Ken Burns orgánico
                // Eliminar foto anterior tras el fundido
                if(visor.children.length > 1) {
                    visor.children[0].style.opacity = '0';
                    setTimeout(() => visor.removeChild(visor.children[0]), 3000);
                }
            }, 100);
        }

        function finalizarRitual() {
            document.getElementById('visor-cine').style.opacity = '0';
            setTimeout(() => {
                location.reload(); // Reinicio limpio para evitar el bucle de fotos negro
            }, 3000);
        }

        window.onload = ritual8K;
    </script>
</body>
</html>
