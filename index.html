<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantabrana: Omni-Kernel Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400;1,700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Spectral', serif; height: 100vh; }

        /* MATERIA VIVA: Fondo con profundidad de campo */
        #capa-materia { position: fixed; inset: 0; z-index: 1; filter: url(#filtro-materia) contrast(150%); opacity: 0.6; }
        .materia { position: absolute; inset: -20%; width: 140%; height: 140%; transition: background 5s ease; background-size: 200% 200%; animation: deriva 25s infinite alternate; }
        @keyframes deriva { from { transform: translate(0,0); } to { transform: translate(-3%, -3%); } }

        /* Familias de Textura */
        .alquitran { background: radial-gradient(circle, #1a1a1a, #050505, #000); }
        .miel { background: radial-gradient(circle, #b8860b, #5c4b14, #000); }
        .magma { background: radial-gradient(circle, #ff4500, #8b0000, #000); }

        /* TEXTO HIERRO CANDENTE (Nitidez Extrema) */
        .txt-fuego {
            position: fixed; inset: 0; z-index: 8000; display: flex; align-items: center; justify-content: center;
            text-align: center; padding: 10%; font-size: clamp(2.5rem, 12vw, 5rem); font-weight: 800;
            color: #ffca28; text-shadow: 0 0 20px #ff4500, 0 0 40px #ff0000;
            opacity: 0; filter: blur(20px); transition: 4s; pointer-events: none;
        }

        /* PERGAMINO: Capa única y escalado dinámico */
        #contenedor-pergamino {
            position: fixed; inset: 0; z-index: 6000; display: flex; align-items: center; justify-content: center;
            background: #000; opacity: 0; transition: 3s; display: none;
        }
        #pergamino-img { 
            max-width: 95%; max-height: 90%; object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(0,0,0,1)); /* Perfilado del pergamino */
        }
        #advertencia {
            position: absolute; width: 65%; color: #3b0a0a; font-weight: 900;
            font-size: clamp(1.3rem, 5.5vw, 2.2rem); text-align: center; line-height: 1.1;
            text-transform: uppercase; opacity: 0; transition: 4s;
        }

        /* VISOR DE FOTOS: Formato Cine */
        #visor { position: fixed; inset: 0; z-index: 100; background: #000; display: none; }
        .foto-film {
            position: absolute; inset: 0; width: 100%; height: 100%;
            object-fit: contain; /* Ajusta la foto sin deformar ni cortar */
            opacity: 0; transition: opacity 3s ease-in-out;
            transform: scale(1.05);
        }
        .zoom-cine { transform: scale(1) !important; transition: transform 12s linear; }

        /* BOTÓN ENTRADA */
        #capa-inicio { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; }
        .btn-ritual {
            background: none; border: 2px solid #d4af37; color: #d4af37; padding: 30px 60px;
            font-size: 1.5rem; letter-spacing: 10px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <svg style="display:none"><filter id="filtro-materia"><feTurbulence type="fractalNoise" baseFrequency="0.02" numOctaves="3" /><feDisplacementMap in="SourceGraphic" scale="60" /></filter></svg>

    <div id="capa-materia"><div id="materia-activa" class="materia alquitran"></div></div>

    <div id="capa-inicio"><button class="btn-ritual" id="btn-play">ENTRAR</button></div>

    <div id="txt-escenario"><div id="fase-texto" class="txt-fuego"></div></div>

    <div id="contenedor-pergamino">
        <img id="pergamino-img" src="">
        <div id="advertencia">ESTAS CANCIONES SON DE OTRO TIEMPO, PUEDEN HERIR SU SENSIBILIDAD</div>
    </div>

    <div id="visor"></div>

    <audio id="snd-amb"></audio>
    <audio id="snd-jota"></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const jotaId = params.get('jota');
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function motor() {
            const res = await fetch('galeria.json');
            const data = await res.json();
            const mat = document.getElementById('materia-activa');

            document.getElementById('btn-play').onclick = async () => {
                document.getElementById('capa-inicio').style.opacity = '0';
                const amb = document.getElementById('snd-amb');
                const jota = document.getElementById('snd-jota');
                amb.play().then(() => amb.pause()); // Desbloqueo inicial
                setTimeout(() => document.getElementById('capa-inicio').style.display = 'none', 1000);

                // FASE 1: CANTABRANA (Alquitrán)
                mat.className = "materia alquitran";
                if(data.ambientes.length) { amb.src = "ambiente/" + data.ambientes[0]; amb.play(); }
                await lanzarTexto("CANTABRANA", 4000);

                // FASE 2: PUERTAS (Miel)
                mat.className = "materia miel";
                await lanzarTexto("MEMORIA VIVA", 4000);

                // FASE 3: EL PERGAMINO (Fondo Negro Puro para resaltar la capa del pergamino)
                const escPerg = document.getElementById('contenedor-pergamino');
                const imgPerg = document.getElementById('pergamino-img');
                // SELECCIÓN ALEATORIA REAL
                const pergRandom = data.pergaminos[Math.floor(Math.random() * data.pergaminos.length)];
                imgPerg.src = `assets/pergaminos/${pergRandom}`;
                
                escPerg.style.display = 'flex';
                await delay(100);
                escPerg.style.opacity = '1';
                await delay(2000);
                document.getElementById('advertencia').style.opacity = '1';
                await wait(8000);
                escPerg.style.opacity = '0';
                await delay(2500);
                escPerg.style.display = 'none';

                // FASE 4: LA JOTA (Transición suave)
                amb.pause();
                mat.className = "materia magma";
                if(jotaId) {
                    jota.src = "jotas/" + jotaId;
                    jota.play();
                    document.getElementById('visor').style.display = 'block';
                    const fotos = [...data.fotos_arcos.map(f=>"fotos/arcos_puertas/"+f), ...data.fotos_detalles.map(f=>"fotos/detalles/"+f)];
                    iniciarCarrusel(fotos, jota);
                }
            };
        }

        async function lanzarTexto(t, d) {
            const el = document.getElementById('fase-texto');
            el.innerText = t;
            el.style.opacity = '1'; el.style.filter = 'blur(0px)';
            await delay(d);
            el.style.opacity = '0'; el.style.filter = 'blur(25px)';
            await delay(2000);
        }

        function iniciarCarrusel(lista, player) {
            let i = 0;
            const visor = document.getElementById('visor');
            
            const cambiar = () => {
                if(player.ended) { location.reload(); return; }
                
                const img = document.createElement('img');
                img.src = lista[i % lista.length];
                img.className = 'foto-film';
                visor.appendChild(img);
                
                setTimeout(() => {
                    img.style.opacity = '1';
                    img.classList.add('zoom-cine');
                    if(visor.children.length > 1) {
                        visor.children[0].style.opacity = '0';
                        setTimeout(() => visor.removeChild(visor.children[0]), 3000);
                    }
                    i++;
                }, 100);
            };
            
            cambiar();
            setInterval(cambiar, 8000); // Ritmo pausado de 8 segundos
        }

        window.onload = motor;
    </script>
</body>
</html>
