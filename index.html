<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cantabrana: Memoria Viva</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400;1,700&display=swap');
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:#000; overflow:hidden; font-family:'Spectral', serif; height:100vh; color:#7d6b58; }
        
        #viewport { position:fixed; inset:0; perspective:1500px; display:flex; justify-content:center; align-items:center; background:radial-gradient(circle,#0a0a0a 0%,#000 100%); z-index:1; }
        
        /* Ajuste para que la textura parezca "brotar" */
        #canvas-texturas { 
            position: absolute; 
            inset: 0; 
            z-index: 2; 
            pointer-events: none; 
            mix-blend-mode: screen; 
            transition: opacity 3s ease-in-out, transform 8s ease-out;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            opacity: 0;
        }

        #foto-activa { max-width:90%; max-height:80%; object-fit:contain; opacity:0; filter:brightness(0) blur(15px); transform:translateZ(-200px); transition:5s cubic-bezier(0.4,0,0.2,1); z-index: 3; }
        .emerger { opacity:1 !important; filter:brightness(0.9) blur(0px) !important; transform:translateZ(100px) !important; }
        
        #capa-inicio { position:fixed; inset:0; background:#000; z-index:6000; display:flex; flex-direction:column; justify-content:center; align-items:center; transition:4s; }
        #btn-iniciar { background:transparent; border:1px solid #332b24; color:#8a7a6a; padding:25px 60px; cursor:pointer; letter-spacing:5px; text-transform:uppercase; transition: 0.5s; }
        #btn-iniciar:hover { background: #1a1510; color: #c4b5a4; }

        #subtitulos { position:fixed; bottom:120px; width:80%; left:10%; text-align:center; color:#fff; background:rgba(0,0,0,0.8); padding:15px; z-index:7000; display:none; border:1px solid #332b24; font-style: italic; }
    </style>
</head>
<body>

<div id="capa-inicio">
    <button id="btn-iniciar">Escuchar el tiempo</button>
</div>

<div id="viewport">
    <div id="canvas-texturas"></div>
    <img id="foto-activa" src="" alt="">
</div>

<div id="subtitulos"></div>
<audio id="musica-ambiente" loop src="audio/ambiente.mp3"></audio>
<audio id="player-jota"></audio>

<script>
// --- CONFIGURACIÓN ---
const OPENAI_API_KEY = "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"; // Reemplaza con tu clave real
// ---------------------

const urlParams = new URLSearchParams(window.location.search);
const jotaId = urlParams.get('jota');
const visor = document.getElementById('foto-activa');
const canvas = document.getElementById('canvas-texturas');
const jotaPlayer = document.getElementById('player-jota');
const ambiente = document.getElementById('musica-ambiente');
const subtitulosBox = document.getElementById('subtitulos');

const familiasTexturas = ["agua marina", "oscura", "vino", "plata", "oro miel", "alquitrán", "magma", "tinta", "hielo", "efecto glaciar", "musgo"];

async function generarTexturaIA() {
    const texturaAleatoria = familiasTexturas[Math.floor(Math.random() * familiasTexturas.length)];
    
    try {
        const response = await fetch('https://api.openai.com/v1/images/generations', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${OPENAI_API_KEY}`
            },
            body: JSON.stringify({
                prompt: `Organic fluid texture of ${texturaAleatoria}, macro style, flowing like a living organism, cinematic, dark atmospheric background, 4k, no distortions`,
                n: 1,
                size: "1024x1024"
            })
        });
        const data = await response.json();
        if(data.data) aplicarTexturaAlCanvas(data.data[0].url);
    } catch (e) {
        console.error("Error con OpenAI: ", e);
    }
}

function aplicarTexturaAlCanvas(url) {
    // Efecto de brote: reseteamos escala y opacidad antes de mostrar la nueva
    canvas.style.opacity = '0';
    canvas.style.transform = 'scale(1.2) translateY(-20px)';
    
    setTimeout(() => {
        canvas.style.backgroundImage = `url('${url}')`;
        canvas.style.opacity = '0.5';
        canvas.style.transform = 'scale(1) translateY(0px)'; // Cae y se asienta
    }, 3000);
}

async function init() {
    let galeriaData;
    try {
        const res = await fetch('galeria.json');
        galeriaData = await res.json();
    } catch (e) {
        console.warn("No se encontró galeria.json, usando modo demo.");
    }

    document.getElementById('btn-iniciar').onclick = () => {
        document.getElementById('capa-inicio').style.opacity = '0';
        setTimeout(() => document.getElementById('capa-inicio').style.display = 'none', 4000);
        
        // Iniciar audio ambiente
        ambiente.volume = 0.3;
        ambiente.play().catch(e => console.log("Audio bloqueado"));

        if(jotaId) {
            jotaPlayer.src = `jotas/${jotaId}`;
            jotaPlayer.play();
            subtitulosBox.style.display = 'block';
            subtitulosBox.textContent = "La memoria se despliega...";
            
            generarTexturaIA();

            if(galeriaData) {
                let fotos = [...galeriaData.fotos_arcos, ...galeriaData.fotos_detalles];
                setInterval(() => {
                    const foto = fotos[Math.floor(Math.random()*fotos.length)];
                    visor.classList.remove('emerger');
                    
                    setTimeout(() => {
                        visor.src = foto.includes('/') ? foto : `fotos/detalles/${foto}`;
                        visor.classList.add('emerger');
                        generarTexturaIA();
                    }, 2000);
                }, 14000); // Un poco más de tiempo para apreciar la textura
            }
        }
    };
}

window.onload = init;
</script>
</body>
</html>
