<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantabrana Omni-Kernel 8K</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400;1,700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Spectral', serif; height: 100vh; }

        /* CAPA DE TEXTURA OMNI-KERNEL */
        #capa-textura { 
            position: fixed; inset: 0; z-index: 5; 
            opacity: 0.6; transition: 5s ease-in-out;
            pointer-events: none;
        }

        /* Ruido fractal para dar realismo de "materia viva" */
        #capa-textura::before {
            content: ""; position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            mix-blend-mode: overlay; opacity: 0.5;
        }

        /* Familias de Texturas Animadas */
        .textura-magma { background: radial-gradient(circle at center, #ff4500, #800000, #000); animation: fluir 15s infinite alternate; }
        .textura-oro { background: radial-gradient(circle at center, #d4af37, #8a7a6a, #1a1a1a); animation: fluir 20s infinite alternate; }
        .textura-alquitran { background: radial-gradient(circle at center, #0a0a0a, #1a1a1a, #000); animation: fluir 10s infinite alternate; }
        .textura-agua { background: radial-gradient(circle at center, #00ced1, #00008b, #000); animation: fluir 18s infinite alternate; }
        .textura-vino { background: radial-gradient(circle at center, #722f37, #3b0a0a, #000); animation: fluir 15s infinite alternate; }

        @keyframes fluir {
            0% { transform: scale(1) rotate(0deg); filter: hue-rotate(0deg); }
            100% { transform: scale(1.2) rotate(5deg); filter: hue-rotate(10deg); }
        }

        /* Elementos del Guion */
        #capa-inicio { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; }
        .btn-aura {
            background: none; border: 1px solid #d4af37; color: #d4af37; padding: 25px 50px;
            font-size: 1.2rem; cursor: pointer; letter-spacing: 5px; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); animation: aura 2s infinite;
        }
        @keyframes aura { 0%, 100% { box-shadow: 0 0 20px #d4af37; } 50% { box-shadow: 0 0 60px #d4af37; } }

        #escenario { position: fixed; inset: 0; z-index: 5000; display: flex; align-items: center; justify-content: center; text-align: center; pointer-events: none; }
        .texto { position: absolute; width: 85%; font-size: 2rem; opacity: 0; filter: blur(20px); transition: 4s; color: #f0e6d2; }
        #pergamino-img { max-width: 85%; max-height: 70%; opacity: 0; transition: 4s; filter: drop-shadow(0 0 30px #000); }

        .visible { opacity: 1 !important; filter: blur(0px) !important; }
        .quemado { opacity: 0 !important; filter: blur(40px) brightness(10) !important; }

        #visor-fotos { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .foto { position: absolute; max-width: 90%; max-height: 85%; opacity: 0; transition: 3s; object-fit: contain; }
        .activa { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="capa-textura" class="textura-alquitran"></div>

    <div id="capa-inicio">
        <button class="btn-aura" id="btn-play">Escuchar el tiempo</button>
    </div>

    <div id="escenario">
        <div id="txt1" class="texto">CANTABRANA LLAMA AL PASADO...</div>
        <div id="txt2" class="texto">A TRAVÉS DE SUS PUERTAS CENTENARIAS...</div>
        <img id="pergamino-img" src="">
        <div id="txt3" class="texto" style="font-size: 1.3rem;">ESTAS CANCIONES SON DE OTRO TIEMPO...</div>
    </div>

    <div id="visor-fotos"><img id="foto-main" class="foto" src=""></div>

    <audio id="audio-amb"></audio>
    <audio id="audio-jota"></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const jotaId = params.get('jota');
        const wait = ms => new Promise(res => setTimeout(res, ms));

        async function ritual() {
            const res = await fetch('galeria.json');
            const data = await res.json();
            const texCapa = document.getElementById('capa-textura');

            document.getElementById('btn-play').onclick = async () => {
                document.getElementById('capa-inicio').style.opacity = '0';
                const amb = document.getElementById('audio-amb');
                const jota = document.getElementById('audio-jota');
                amb.play().then(()=>amb.pause());

                // Cambiar textura a "Vino" para el inicio
                texCapa.className = "textura-vino";
                
                if(data.ambientes.length) {
                    amb.src = "ambiente/" + data.ambientes[0];
                    amb.play();
                }

                // Fases de texto
                await wait(1000);
                document.getElementById('txt1').classList.add('visible');
                await wait(5000);
                document.getElementById('txt1').classList.replace('visible', 'quemado');

                // Cambiar textura a "Oro Miel"
                texCapa.className = "textura-oro";
                await wait(2000);
                document.getElementById('txt2').classList.add('visible');
                await wait(5000);
                document.getElementById('txt2').classList.replace('visible', 'quemado');

                // Pergamino y textura "Magma"
                texCapa.className = "textura-magma";
                await wait(2000);
                const p = document.getElementById('pergamino-img');
                p.src = `assets/pergaminos/${data.pergaminos[0]}`;
                p.classList.add('visible');
                document.getElementById('txt3').classList.add('visible');
                await wait(8000);
                p.classList.replace('visible', 'quemado');
                document.getElementById('txt3').classList.replace('visible', 'quemado');

                // Jota y textura "Agua Marina"
                amb.pause();
                texCapa.className = "textura-agua";
                if(jotaId) {
                    jota.src = "jotas/" + jotaId;
                    jota.play();
                    const fotos = [...data.fotos_arcos.map(f=>"fotos/arcos_puertas/"+f), ...data.fotos_detalles.map(f=>"fotos/detalles/"+f)];
                    iniciarFotos(fotos);
                }
            };
        }

        function iniciarFotos(lista) {
            let i = 0;
            const visor = document.getElementById('foto-main');
            const loop = () => {
                visor.classList.remove('activa');
                setTimeout(() => {
                    visor.src = lista[i];
                    visor.onload = () => { visor.classList.add('activa'); i = (i + 1) % lista.length; };
                }, 2000);
            };
            loop();
            setInterval(loop, 6000);
        }

        window.onload = ritual;
    </script>
</body>
</html>
