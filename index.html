<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cantabrana: Omni-Kernel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400;1,700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Spectral', serif; height: 100vh; color: #fff; }

        /* TEXTURA VIVA: Efecto Alquitrán/Magma */
        #capa-textura { 
            position: fixed; inset: 0; z-index: 5; opacity: 0.5;
            background: radial-gradient(circle at center, #1a1a1a, #000);
            transition: background 5s ease; pointer-events: none;
        }
        #capa-textura::after {
            content: ""; position: absolute; inset: 0;
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.4; mix-blend-mode: overlay;
        }

        /* ESCENARIO CINEMÁTICO */
        #escenario { 
            position: fixed; inset: 0; z-index: 5000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .fase { 
            position: absolute; width: 85%; text-align: center; opacity: 0; 
            filter: blur(20px); transition: 4s cubic-bezier(0.4, 0, 0.2, 1); 
        }
        .activo { opacity: 1 !important; filter: blur(0px) !important; transform: scale(1) !important; }

        /* PERGAMINO: Optimización Real */
        #contenedor-pergamino { 
            position: relative; width: 90vw; height: 80vh; 
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: 3s; transform: scale(0.9);
        }
        #pergamino-img { width: 100%; height: 100%; object-fit: contain; }
        #texto-fuego { 
            position: absolute; width: 65%; color: #3b0a0a; font-weight: bold;
            font-size: clamp(1rem, 4.5vw, 1.3rem); line-height: 1.5; text-align: center;
            opacity: 0; transition: 5s;
        }

        /* CARRUSEL DE FOTOS 8K */
        #visor { position: fixed; inset: 0; z-index: 100; display: none; background: #000; }
        .foto-film { 
            position: absolute; inset: 0; width: 100%; height: 100%; 
            object-fit: contain; opacity: 0; transition: opacity 2s ease-in-out;
            transform: scale(1.05);
        }
        .zoom-in { transform: scale(1) !important; transition: transform 10s linear; }

        /* BOTÓN INICIAL */
        #capa-inicio { position: fixed; inset: 0; z-index: 9999; background: #000; display: flex; align-items: center; justify-content: center; }
        .btn-aura {
            background: none; border: 1px solid #d4af37; color: #d4af37; padding: 25px 50px;
            font-size: 1.2rem; cursor: pointer; letter-spacing: 5px; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); animation: aura 2s infinite;
        }
        @keyframes aura { 0%, 100% { opacity: 0.7; box-shadow: 0 0 10px #d4af37; } 50% { opacity: 1; box-shadow: 0 0 40px #d4af37; } }
    </style>
</head>
<body>

    <div id="capa-textura"></div>

    <div id="capa-inicio">
        <button class="btn-aura" id="btn-ritual">Escuchar el tiempo</button>
    </div>

    <div id="escenario">
        <div id="f1" class="fase" style="font-size: 2.5rem;">CANTABRANA LLAMA AL PASADO...</div>
        <div id="f2" class="fase" style="font-size: 2rem;">A TRAVÉS DE SUS PUERTAS CENTENARIAS...</div>
        
        <div id="contenedor-pergamino">
            <img id="pergamino-img" src="">
            <div id="texto-fuego">ESTAS CANCIONES SON DE OTRO TIEMPO, ALGUNAS DE ELLAS PUEDEN HERIR SU SENSIBILIDAD</div>
        </div>
    </div>

    <div id="visor"></div>

    <audio id="audio-amb"></audio>
    <audio id="audio-jota"></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const jotaId = params.get('jota');
        const wait = ms => new Promise(res => setTimeout(res, ms));

        async function ritual() {
            const response = await fetch('galeria.json');
            const data = await response.json();
            const tex = document.getElementById('capa-textura');

            document.getElementById('btn-ritual').onclick = async () => {
                document.getElementById('capa-inicio').style.opacity = '0';
                const amb = document.getElementById('audio-amb');
                const jota = document.getElementById('audio-jota');
                
                // Desbloqueo inicial
                amb.play().then(()=>amb.pause());
                setTimeout(() => document.getElementById('capa-inicio').style.display = 'none', 2000);

                // FASE 1: VINO
                tex.style.background = "radial-gradient(circle, #3b0a0a, #000)";
                if(data.ambientes.length) {
                    amb.src = "ambiente/" + data.ambientes[0];
                    amb.play();
                }
                document.getElementById('f1').classList.add('activo');
                await wait(6000);
                document.getElementById('f1').classList.remove('activo');
                await wait(2000);

                // FASE 2: ORO
                tex.style.background = "radial-gradient(circle, #5c4b37, #000)";
                document.getElementById('f2').classList.add('activo');
                await wait(6000);
                document.getElementById('f2').classList.remove('activo');
                await wait(2000);

                // FASE 3: PERGAMINO + MAGMA
                tex.style.background = "radial-gradient(circle, #800000, #000)";
                document.getElementById('pergamino-img').src = `assets/pergaminos/${data.pergaminos[0]}`;
                document.getElementById('contenedor-pergamino').classList.add('activo');
                await wait(2000);
                document.getElementById('texto-fuego').style.opacity = '1';
                await wait(8000);
                document.getElementById('contenedor-pergamino').classList.remove('activo');
                await wait(3000);

                // FASE 4: JOTA Y FOTOS (Fin del bucle infinito)
                amb.pause();
                if(jotaId) {
                    jota.src = "jotas/" + jotaId;
                    const visor = document.getElementById('visor');
                    visor.style.display = 'block';
                    
                    const fotos = [...data.fotos_arcos.map(f=>"fotos/arcos_puertas/"+f), ...data.fotos_detalles.map(f=>"fotos/detalles/"+f)];
                    
                    jota.play();
                    
                    // Manejo del carrusel sincronizado con la duración de la jota
                    let index = 0;
                    const interval = setInterval(() => {
                        if (jota.ended) {
                            clearInterval(interval);
                            finalizarRitual();
                            return;
                        }
                        cambiarFoto(fotos[index % fotos.length]);
                        index++;
                    }, 6000); // 6 segundos por foto (4 visible, 2 transición)
                }
            };
        }

        function cambiarFoto(ruta) {
            const visor = document.getElementById('visor');
            const imgNueva = document.createElement('img');
            imgNueva.src = ruta;
            imgNueva.className = 'foto-film';
            
            visor.appendChild(imgNueva);
            
            setTimeout(() => {
                imgNueva.style.opacity = '1';
                imgNueva.classList.add('zoom-in');
                // Eliminar la foto anterior después de la transición
                if(visor.children.length > 2) visor.removeChild(visor.children[0]);
            }, 100);
        }

        function finalizarRitual() {
            document.getElementById('visor').style.opacity = '0';
            setTimeout(() => {
                // Aquí entraría la lógica del Sello y la Estela que pediste
                location.reload(); // Reinicio temporal para evitar el bucle negro
            }, 3000);
        }

        window.onload = ritual;
    </script>
</body>
</html>
