        .emerger { opacity:1 !important; filter:brightness(0.9) blur(0px) !important; transform:translateZ(100px) !important; }
        #capa-inicio { position:fixed; inset:0; background:#000; z-index:6000; display:flex; flex-direction:column; justify-content:center; align-items:center; transition:4s; }
        #btn-iniciar { background:#000; border:1px solid #332b24; color:#8a7a6a; padding:25px 60px; cursor:pointer; letter-spacing:5px; text-transform:uppercase; }
        #subtitulos { position:fixed; bottom:120px; width:80%; left:10%; text-align:center; color:#fff; background:rgba(0,0,0,0.8); padding:15px; z-index:7000; display:none; border:1px solid #332b24; }

const familiasTexturas = ["agua marina", "oscura", "vino", "plata", "oro miel", "alquitrán", "magma", "tinta", "hielo", "efecto glaciar", "musgo"];

async function generarTexturaIA() {
    const texturaAleatoria = familiasTexturas[Math.floor(Math.random() * familiasTexturas.length)];
    console.log("Generando textura visual: " + texturaAleatoria);
    
    try {
        const response = await fetch('https://api.openai.com/v1/images/generations', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${OPENAI_API_KEY}`
            },
            body: JSON.stringify({
                prompt: `Textura fluida de ${texturaAleatoria}, estilo macro, orgánica, brotando como algo vivo, cinemática, 4k, sin distorsiones`,
                n: 1,
                size: "1024x1024"
            })
        });
        const data = await response.json();
        aplicarTexturaAlCanvas(data.data[0].url);
    } catch (e) {
        console.error("Error con OpenAI: ", e);
    }
}

function aplicarTexturaAlCanvas(url) {
    const canvas = document.getElementById('canvas-texturas');
    canvas.style.backgroundImage = `url('${url}')`;
    canvas.style.backgroundSize = 'cover';
    canvas.style.opacity = '0.4';
}
