<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantabrana</title>
    <style>
        body { background: #000; color: #8a7a6a; font-family: serif; margin: 0; overflow: hidden; height: 100vh; }
        #inicio { position: fixed; inset: 0; background: #000; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        button { background: none; border: 1px solid #332b24; color: #fff; padding: 25px 50px; cursor: pointer; letter-spacing: 5px; font-size: 1.2rem; }
        #contenedor { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        img { max-width: 90%; max-height: 85%; transition: 4s ease-in-out; opacity: 0; transform: scale(0.9); }
        .visible { opacity: 1; transform: scale(1); }
        #error-log { position: fixed; bottom: 10px; color: red; font-size: 12px; width: 100%; text-align: center; z-index: 200; }
    </style>
</head>
<body>

    <div id="inicio">
        <button id="btn-play">ESCUCHAR EL TIEMPO</button>
    </div>

    <div id="contenedor">
        <img id="foto-pantalla" src="">
    </div>

    <div id="error-log"></div>

    <audio id="reproductor"></audio>

    <script>
        const log = (msg) => { document.getElementById('error-log').innerText = msg; };
        const params = new URLSearchParams(window.location.search);
        const archivoJota = params.get('jota');

        async function cargarSistema() {
            try {
                const respuesta = await fetch('galeria.json');
                const datos = await respuesta.json();

                document.getElementById('btn-play').onclick = () => {
                    if (!archivoJota) {
                        log("Error: No hay jota definida en el QR");
                        return;
                    }

                    // Ocultar inicio
                    document.getElementById('inicio').style.display = 'none';

                    // Configurar y reproducir Audio
                    const player = document.getElementById('reproductor');
                    player.src = "jotas/" + archivoJota;
                    
                    player.play().catch(e => {
                        log("Error al reproducir: " + archivoJota + ". Revisa si el nombre es exacto.");
                        console.error(e);
                    });

                    // Configurar Carrusel de Fotos
                    const listaFotos = [
                        ...datos.fotos_arcos.map(f => "fotos/arcos_puertas/" + f),
                        ...datos.fotos_detalles.map(f => "fotos/detalles/" + f)
                    ];
                    
                    if (listaFotos.length > 0) {
                        let idx = 0;
                        const visor = document.getElementById('foto-pantalla');
                        
                        const cambiarFoto = () => {
                            visor.classList.remove('visible');
                            setTimeout(() => {
                                visor.src = listaFotos[idx];
                                visor.onload = () => visor.classList.add('visible');
                                idx = (idx + 1) % listaFotos.length;
                            }, 2000);
                        };

                        cambiarFoto();
                        setInterval(cambiarFoto, 12000); // Cambia cada 12 segundos
                    }
                };
            } catch (error) {
                log("Error cargando galeria.json. ¿Has subido el archivo?");
            }
        }

        window.onload = cargarSistema;
    </script>
</body>
</html>
