<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cantabrana: Omni-Kernel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400;1,700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Spectral', serif; height: 100vh; color: #fff; }

        /* TEXTURAS VIVAS (Fondo dinámico) */
        #capa-textura { 
            position: fixed; inset: 0; z-index: 1; opacity: 0.4;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
            filter: contrast(150%) brightness(50%);
        }

        /* BOTÓN INICIAL CON AURA */
        #pantalla-inicio { 
            position: fixed; inset: 0; z-index: 9000; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-aura {
            background: none; border: 1px solid #d4af37; color: #d4af37;
            padding: 30px 60px; font-size: 1.2rem; cursor: pointer;
            letter-spacing: 10px; text-transform: uppercase;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.3);
            animation: aura-pulsar 2s infinite ease-in-out;
        }
        @keyframes aura-pulsar {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px #d4af37; opacity: 0.8; }
            50% { transform: scale(1.05); box-shadow: 0 0 50px #d4af37; opacity: 1; }
        }

        /* ESCENARIO DE TEXTOS Y PERGAMINO */
        #escenario-liturgico {
            position: fixed; inset: 0; z-index: 5000; 
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
        }
        .texto-emergente {
            font-size: 2.2rem; text-align: center; opacity: 0; 
            filter: blur(15px); transition: 4s ease-out; position: absolute;
            width: 80%; line-height: 1.5; color: #f0e6d2;
            text-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
        .visible { opacity: 1 !important; filter: blur(0px) !important; }
        .desintegrar { animation: combustion 3s forwards; }

        @keyframes combustion {
            0% { filter: blur(0) brightness(1); opacity: 1; }
            50% { filter: blur(5px) brightness(5) sepia(1); color: #ff4500; }
            100% { filter: blur(30px) brightness(10); opacity: 0; transform: translateY(-50px) scale(1.2); }
        }

        #pergamino-visual {
            max-width: 80%; max-height: 70%; opacity: 0;
            transition: 5s ease; filter: drop-shadow(0 0 30px #000);
        }

        /* VISOR DE FOTOS (TRANSICIONES ELEGANTES) */
        #contenedor-fotos { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .foto-film { 
            position: absolute; max-width: 90%; max-height: 85%; 
            opacity: 0; transform: scale(1.1); transition: opacity 2s ease-in-out, transform 6s linear;
            object-fit: contain;
        }
        .foto-activa { opacity: 1 !important; transform: scale(1) !important; }

        /* SCROLL INFERIOR */
        #scroll-container {
            position: fixed; bottom: 30px; width: 100%; z-index: 8000;
            overflow: hidden; background: rgba(0,0,0,0.6); padding: 10px 0;
            border-top: 1px solid #332b24; display: none;
        }
        #scroll-text {
            white-space: nowrap; display: inline-block;
            animation: scroll-move 25s linear infinite;
            color: #d4af37; letter-spacing: 4px; font-size: 0.9rem;
        }
        @keyframes scroll-move {
            from { transform: translateX(100%); }
            to { transform: translateX(-100%); }
        }
    </style>
</head>
<body>

    <div id="capa-textura"></div>

    <div id="pantalla-inicio">
        <button class="btn-aura" id="start-btn">Escuchar el tiempo</button>
    </div>

    <div id="escenario-liturgico">
        <div id="fase1" class="texto-emergente">CANTABRANA LLAMA AL PASADO...</div>
        <div id="fase2" class="texto-emergente">A TRAVÉS DE SUS PUERTAS CENTENARIAS...</div>
        <img id="pergamino-visual" src="">
        <div id="alerta-sensibilidad" class="texto-emergente" style="font-size: 1.5rem; color: #c0a080;">
            ESTAS CANCIONES SON DE OTRO TIEMPO...<br>PUEDEN HERIR SU SENSIBILIDAD.
        </div>
    </div>

    <div id="contenedor-fotos">
        <img id="visor-img" class="foto-film" src="">
    </div>

    <div id="scroll-container">
        <div id="scroll-text">CANTABRANA: MEMORIA VIVA - PUERTAS Y ARCOS CENTENARIOS</div>
    </div>

    <audio id="audio-amb"></audio>
    <audio id="audio-jota"></audio>

    <script>
        const params = new URLSearchParams(window.location.search);
        const jotaId = params.get('jota');
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function iniciarRitual() {
            const res = await fetch('galeria.json');
            const data = await res.json();

            document.getElementById('start-btn').onclick = async () => {
                // Desaparece botón
                document.getElementById('pantalla-inicio').style.opacity = '0';
                setTimeout(() => document.getElementById('pantalla-inicio').style.display = 'none', 3000);

                // 1. AMBIENTE ALEATORIO Y TEXTOS
                const amb = document.getElementById('audio-amb');
                amb.src = "ambiente/" + data.ambientes[Math.floor(Math.random()*data.ambientes.length)];
                amb.play();
                document.getElementById('scroll-container').style.display = 'block';

                // Fase 1: Texto inicial
                const t1 = document.getElementById('fase1');
                t1.classList.add('visible');
                await delay(5000);
                t1.classList.add('desintegrar');
                await delay(2000);

                // Fase 2: Continuación
                const t2 = document.getElementById('fase2');
                t2.classList.add('visible');
                await delay(5000);
                t2.classList.add('desintegrar');
                await delay(3000);

                // 2. PERGAMINO ALEATORIO Y ALERTA
                const perg = document.getElementById('pergamino-visual');
                perg.src = `assets/pergaminos/${data.pergaminos[Math.floor(Math.random()*data.pergaminos.length)]}`;
                perg.style.opacity = '1';
                
                const alerta = document.getElementById('alerta-sensibilidad');
                alerta.classList.add('visible');
                await delay(7000);
                
                // Combustión final del pergamino
                alerta.classList.add('desintegrar');
                perg.classList.add('desintegrar');
                await delay(3000);

                // 3. INICIO DE JOTA Y FOTOS
                amb.pause();
                const jota = document.getElementById('audio-jota');
                jota.src = "jotas/" + jotaId;
                
                // Cambiar scroll a info de la jota
                document.getElementById('scroll-text').innerText = `REPRODUCIENDO: ${jotaId.replace('.mp3','')} - CANTABRANA`;
                
                jota.play();
                
                const fotos = [...data.fotos_arcos.map(f=>"fotos/arcos_puertas/"+f), ...data.fotos_detalles.map(f=>"fotos/detalles/"+f)];
                iniciarCarruselCinematico(fotos.sort(() => Math.random() - 0.5));
            };
        }

        function iniciarCarruselCinematico(lista) {
            let i = 0;
            const img = document.getElementById('visor-img');
            
            const transicion = () => {
                img.classList.remove('foto-activa');
                
                setTimeout(() => {
                    img.src = lista[i];
                    img.onload = () => {
                        img.classList.add('foto-activa');
                        i = (i + 1) % lista.length;
                    };
                }, 2000); // 2 segundos de transición (negro)
            };

            transicion();
            setInterval(transicion, 6000); // 4 segundos visible + 2 de transición
        }

        window.onload = iniciarRitual;
    </script>
</body>
</html>
