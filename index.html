<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cantabrana: Omni-Kernel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Spectral:ital,wght@1,400;1,700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; font-family: 'Spectral', serif; height: 100vh; color: #fff; }

        /* Consola de diagnóstico (Solo se ve si hay errores) */
        #debug { position: fixed; top: 0; width: 100%; background: rgba(255,0,0,0.8); font-size: 10px; z-index: 10000; text-align: center; }

        /* BOTÓN DE ARRANQUE CON AURA */
        #pantalla-inicio { 
            position: fixed; inset: 0; z-index: 9000; background: #000; 
            display: flex; align-items: center; justify-content: center; transition: 2s; 
        }
        .btn-aura {
            background: none; border: 1px solid #d4af37; color: #d4af37;
            padding: 30px 60px; font-size: 1.2rem; cursor: pointer;
            letter-spacing: 8px; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
            animation: aura-pulsar 2s infinite ease-in-out;
        }
        @keyframes aura-pulsar { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } }

        /* ESCENARIO LURÚRGICO */
        #escenario { position: fixed; inset: 0; z-index: 5000; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        .texto { font-size: 2.2rem; text-align: center; opacity: 0; filter: blur(15px); transition: 4s; position: absolute; width: 85%; }
        .visible { opacity: 1 !important; filter: blur(0px) !important; }
        .quemar { animation: combustion 3s forwards; }
        @keyframes combustion { 0% { opacity: 1; } 100% { filter: blur(20px) brightness(10); opacity: 0; transform: scale(1.3); } }

        #pergamino { max-width: 80%; max-height: 70%; opacity: 0; transition: 4s; }

        /* VISOR FOTOS */
        #contenedor-fotos { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
        .foto { position: absolute; max-width: 90%; max-height: 85%; opacity: 0; transition: 2s; object-fit: contain; }
        .activa { opacity: 1 !important; }
    </style>
</head>
<body>

    <div id="debug"></div>

    <div id="pantalla-inicio">
        <button class="btn-aura" id="btn-arranque">Escuchar el tiempo</button>
    </div>

    <div id="escenario">
        <div id="t1" class="texto">CANTABRANA LLAMA AL PASADO...</div>
        <div id="t2" class="texto">A TRAVÉS DE SUS PUERTAS CENTENARIAS...</div>
        <img id="pergamino" src="">
        <div id="t3" class="texto" style="font-size: 1.4rem;">ESTAS CANCIONES SON DE OTRO TIEMPO...</div>
    </div>

    <div id="contenedor-fotos"><img id="visor" class="foto" src=""></div>

    <audio id="snd-amb" preload="auto"></audio>
    <audio id="snd-jota" preload="auto"></audio>

    <script>
        const dbg = (txt) => { document.getElementById('debug').innerText = txt; };
        const params = new URLSearchParams(window.location.search);
        const jotaId = params.get('jota');
        const delay = ms => new Promise(res => setTimeout(res, ms));

        async function sistema() {
            let galeria;
            try {
                const r = await fetch('galeria.json');
                galeria = await r.json();
            } catch(e) { dbg("ERROR: No se encontró galeria.json"); return; }

            document.getElementById('btn-arranque').onclick = async function() {
                dbg("Iniciando ritual...");
                
                // DESBLOQUEO DE AUDIO (Clave para móviles)
                const amb = document.getElementById('snd-amb');
                const jota = document.getElementById('snd-jota');
                amb.play().then(() => amb.pause()).catch(e => console.log("Audio prep ready"));
                jota.play().then(() => jota.pause()).catch(e => console.log("Audio prep ready"));

                // Ocultar botón
                document.getElementById('pantalla-inicio').style.opacity = '0';
                setTimeout(() => document.getElementById('pantalla-inicio').style.display = 'none', 2000);

                // 1. AMBIENTE
                if (galeria.ambientes.length > 0) {
                    amb.src = "ambiente/" + galeria.ambientes[Math.floor(Math.random()*galeria.ambientes.length)];
                    amb.play();
                }

                // 2. SECUENCIA DE TEXTOS
                await delay(1000);
                document.getElementById('t1').classList.add('visible');
                await delay(5000);
                document.getElementById('t1').classList.add('quemar');
                
                await delay(2000);
                document.getElementById('t2').classList.add('visible');
                await delay(5000);
                document.getElementById('t2').classList.add('quemar');

                // 3. PERGAMINO
                await delay(2000);
                if (galeria.pergaminos.length > 0) {
                    const p = document.getElementById('pergamino');
                    p.src = `assets/pergaminos/${galeria.pergaminos[Math.floor(Math.random()*galeria.pergaminos.length)]}`;
                    p.style.opacity = '1';
                    document.getElementById('t3').classList.add('visible');
                    await delay(7000);
                    p.classList.add('quemar');
                    document.getElementById('t3').classList.add('quemar');
                }

                // 4. LA JOTA
                await delay(3000);
                amb.pause();
                if(!jotaId) { dbg("ERROR: QR sin nombre de jota"); return; }
                
                jota.src = "jotas/" + jotaId;
                jota.play().then(() => {
                    dbg(""); // Limpiar debug si todo va bien
                    const fotos = [...galeria.fotos_arcos.map(f=>"fotos/arcos_puertas/"+f), ...galeria.fotos_detalles.map(f=>"fotos/detalles/"+f)];
                    iniciarFotos(fotos);
                }).catch(e => dbg("ERROR: No se encuentra el audio jotas/" + jotaId));
            };
        }

        function iniciarFotos(lista) {
            let i = 0;
            const visor = document.getElementById('visor');
            const cambiar = () => {
                visor.classList.remove('activa');
                setTimeout(() => {
                    visor.src = lista[i];
                    visor.onload = () => { visor.classList.add('activa'); i = (i + 1) % lista.length; };
                }, 1500);
            };
            cambiar();
            setInterval(cambiar, 6000);
        }

        window.onload = sistema;
    </script>
</body>
</html>
